<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1e293b" />
    <meta name="description" content="Кунак — координация взаимопомощи при наводнении на Северном Кавказе" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Кунак — координация взаимопомощи при наводнении" />
    <meta property="og:description" content="Карта инцидентов, уровень рек, запросы помощи, укрытия и оповещения для Северного Кавказа" />
    <meta property="og:image" content="https://mykunak.ru/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://mykunak.ru" />
    <meta property="og:locale" content="ru_RU" />
    <meta property="og:site_name" content="Кунак" />

    <!-- Twitter/X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Кунак — координация взаимопомощи при наводнении" />
    <meta name="twitter:description" content="Карта инцидентов, уровень рек, запросы помощи, укрытия и оповещения для Северного Кавказа" />
    <meta name="twitter:image" content="https://mykunak.ru/og-image.png" />

    <!-- VK -->
    <meta property="vk:image" content="https://mykunak.ru/og-image.png" />

    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png?v=5" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png?v=5" />
    <!-- apple-touch-icon lives at the canonical root path so iOS Safari's
         auto-probe picks it up without depending on the <link> tag being
         parsed. The SPA's nginx try_files fallback would otherwise serve
         index.html for this URL and iOS would fall back to its generated
         letter-placeholder instead of the real logo. -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=5" />
    <link rel="canonical" href="https://mykunak.ru" />
    <title>Кунак</title>

    <!-- Structured data — helps search engines render Kunak as a civic
         platform rather than a generic web app, and signals geographic
         scope so regional queries surface the right result. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Кунак",
      "alternateName": "Kunak",
      "url": "https://mykunak.ru",
      "logo": "https://mykunak.ru/icons/icon-512.png",
      "description": "Платформа координации взаимопомощи при наводнении на Северном Кавказе.",
      "inLanguage": "ru",
      "areaServed": [
        { "@type": "AdministrativeArea", "name": "Республика Дагестан" },
        { "@type": "AdministrativeArea", "name": "Северный Кавказ" }
      ],
      "sameAs": [
        "https://mykunak.ru",
        "https://samurchs.ru"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Kill stale Service Workers — no network requests, no reloads
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(r) {
          r.forEach(function(reg) { reg.unregister(); });
        });
      }
      if (window.caches) {
        caches.keys().then(function(k) {
          k.forEach(function(n) { caches.delete(n); });
        });
      }
    </script>
    <script>
      // Catch JS errors — show overlay instead of white screen
      window.addEventListener('error', function(e) {
        var d = document.getElementById('crash-overlay');
        if (!d) {
          d = document.createElement('div');
          d.id = 'crash-overlay';
          d.style.cssText = 'position:fixed;inset:0;z-index:99999;background:#fff;padding:24px;font:14px/1.5 system-ui;color:#18181b;overflow:auto';
          document.body.appendChild(d);
        }
        d.textContent = '';
        var h = document.createElement('h2');
        h.style.cssText = 'margin:0 0 8px;font-size:18px';
        h.textContent = 'Ошибка загрузки';
        var p = document.createElement('p');
        p.style.cssText = 'color:#71717a;margin:0 0 12px';
        p.textContent = 'Попробуйте обновить страницу';
        var pre = document.createElement('pre');
        pre.style.cssText = 'background:#f4f4f5;padding:12px;border-radius:8px;overflow:auto;font-size:12px;white-space:pre-wrap';
        pre.textContent = (e.message || 'Unknown error') + '\n' + (e.filename || '').split('/').pop() + ':' + (e.lineno || '');
        var btn = document.createElement('button');
        btn.style.cssText = 'margin-top:12px;padding:8px 20px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer';
        btn.textContent = 'Обновить';
        btn.onclick = function() { location.reload(); };
        d.appendChild(h);
        d.appendChild(p);
        d.appendChild(pre);
        d.appendChild(btn);
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
