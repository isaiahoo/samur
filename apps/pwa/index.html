  <body>
    <div id="root"></div>
    <script>
      // Kill stale Service Workers BEFORE modules load — prevents old Workbox SW
      // from hanging fetches and causing white screen in iOS standalone PWA mode.
      if ('serviceWorker' in navigator) {
        // Register self-destructing SW to replace any old cached Workbox SW
        navigator.serviceWorker.register('/sw.js').catch(function(){});
        // Also force-unregister all SWs immediately
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
        // Nuke all caches
        if (window.caches) {
          caches.keys().then(function(keys) {
            keys.forEach(function(k) { caches.delete(k); });
          });
        }
        // If a SW is currently controlling this page, force a clean reload
        if (navigator.serviceWorker.controller) {
          navigator.serviceWorker.controller.postMessage({ type: 'SKIP_WAITING' });
          // Reload once without SW control — only do this once to avoid loops
          if (!sessionStorage.getItem('sw_cleaned')) {
            sessionStorage.setItem('sw_cleaned', '1');
            location.reload();
          }
        }
      }
    </script>
    <script>
      // Catch JS errors — show overlay instead of white screen
      window.addEventListener('error', function(e) {
        var d = document.getElementById('crash-overlay');
        if (!d) {
          d = document.createElement('div');
          d.id = 'crash-overlay';
          d.style.cssText = 'position:fixed;inset:0;z-index:99999;background:#fff;padding:24px;font:14px/1.5 system-ui;color:#18181b;overflow:auto';
          document.body.appendChild(d);
        }
        d.textContent = '';
        var h = document.createElement('h2');
        h.style.cssText = 'margin:0 0 8px;font-size:18px';
        h.textContent = 'Ошибка загрузки';
        var p = document.createElement('p');
        p.style.cssText = 'color:#71717a;margin:0 0 12px';
        p.textContent = 'Попробуйте обновить страницу';
        var pre = document.createElement('pre');
        pre.style.cssText = 'background:#f4f4f5;padding:12px;border-radius:8px;overflow:auto;font-size:12px;white-space:pre-wrap';
        pre.textContent = (e.message || 'Unknown error') + '\n' + (e.filename || '').split('/').pop() + ':' + (e.lineno || '');
        var btn = document.createElement('button');
        btn.style.cssText = 'margin-top:12px;padding:8px 20px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer';
        btn.textContent = 'Обновить';
        btn.onclick = function() { location.reload(); };
        d.appendChild(h);
        d.appendChild(p);
        d.appendChild(pre);
        d.appendChild(btn);
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
