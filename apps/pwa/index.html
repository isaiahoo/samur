<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1e293b" />
    <meta name="description" content="Самур — координация помощи при наводнении в Дагестане" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Самур — координация помощи при наводнении" />
    <meta property="og:description" content="Карта инцидентов, уровень рек, запросы помощи, укрытия и оповещения для Дагестана" />
    <meta property="og:image" content="https://samurchs.ru/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://samurchs.ru" />
    <meta property="og:locale" content="ru_RU" />
    <meta property="og:site_name" content="Самур" />

    <!-- Twitter/X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Самур — координация помощи при наводнении" />
    <meta name="twitter:description" content="Карта инцидентов, уровень рек, запросы помощи, укрытия и оповещения для Дагестана" />
    <meta name="twitter:image" content="https://samurchs.ru/og-image.png" />

    <!-- VK -->
    <meta property="vk:image" content="https://samurchs.ru/og-image.png" />

    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>Самур</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Debug log — visible in the corner. Remove after debugging.
      var _dbg = [];
      function dbgLog(msg) {
        _dbg.push(new Date().toLocaleTimeString() + ' ' + msg);
        var el = document.getElementById('dbg-log');
        if (!el) {
          el = document.createElement('div');
          el.id = 'dbg-log';
          el.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:99999;background:rgba(0,0,0,0.85);color:#0f0;font:11px/1.4 monospace;padding:8px;max-height:40vh;overflow:auto;pointer-events:none';
          document.body.appendChild(el);
        }
        el.textContent = _dbg.slice(-15).join('\n');
      }
      window.dbgLog = dbgLog;
      dbgLog('html parsed');

      // Catch all JS errors
      window.addEventListener('error', function(e) {
        dbgLog('ERROR: ' + (e.message || 'unknown') + ' @ ' + (e.filename || '').split('/').pop() + ':' + e.lineno);
      });
      // Catch unhandled promise rejections
      window.addEventListener('unhandledrejection', function(e) {
        dbgLog('REJECT: ' + (e.reason && e.reason.message || e.reason || 'unknown'));
      });
      // Catch resource load failures (scripts, CSS)
      window.addEventListener('error', function(e) {
        if (e.target && e.target.tagName) {
          dbgLog('LOAD FAIL: ' + e.target.tagName + ' ' + (e.target.src || e.target.href || '').split('/').pop());
        }
      }, true);
      // Track SW state
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          dbgLog('SW regs: ' + regs.length);
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
