name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch: # manual trigger from GitHub UI

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  test-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: samur_test
          POSTGRES_PASSWORD: samur_test
          POSTGRES_DB: samur_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U samur_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://samur_test:samur_test@localhost:5432/samur_test?schema=public
      JWT_SECRET: test-secret-min-32-characters-long
      WEBHOOK_API_KEY: test-api-key
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma migrate deploy --schema packages/db/prisma/schema.prisma
      - run: npm run test:api

  build:
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
