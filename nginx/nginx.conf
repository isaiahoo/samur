user  nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        text/javascript
        image/svg+xml
        application/wasm;

    # Rate-limit zones — IP-keyed, defined here in the http scope so any
    # server{} block in conf.d/* can reference them via `limit_req zone=NAME`.
    # Without a matching `limit_req` directive actually applied to a location,
    # zones do nothing — defining them here is necessary but not sufficient.
    #
    # 10m holds state for ~160k unique IPs, plenty for the Dagestan audience.
    # If limits ever get hit too aggressively we'll see "limiting requests"
    # entries in the nginx error log and can tune from there.
    limit_req_zone $binary_remote_addr zone=api:10m rate=120r/m;      # general API traffic
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;      # login / register / phone-verify — brute-force deterrent
    limit_req_zone $binary_remote_addr zone=sos:10m rate=3r/m;        # /api/v1/help-requests/sos — anonymous SOS endpoint
    limit_req_zone $binary_remote_addr zone=pwa:10m rate=300r/m;      # PWA static assets — generous
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=60r/m;   # inbound webhooks from TG/VK/MCHS feeds

    # Per-IP concurrent-connection cap applied at the server level below.
    # Stops a single abusive client from holding hundreds of sockets open.
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # Response when any limit trips. 429 is honest ("slow down") and browsers
    # typically don't retry-hammer on it, unlike the default 503.
    limit_req_status 429;
    limit_conn_status 429;

    # Upstream definitions
    upstream api_backend {
        server api:3000;
    }

    upstream pwa_backend {
        server pwa:80;
    }

    include /etc/nginx/conf.d/*.conf;
}
