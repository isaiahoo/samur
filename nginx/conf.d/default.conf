# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name mykunak.ru samurchs.ru;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    # HTTP/2 on TCP (default, fallback for clients without QUIC).
    listen 443 ssl;
    http2 on;

    # HTTP/3 on UDP via QUIC. nginx 1.27 ships with --with-http_v3_module
    # already; no module load needed. `reuseport` is required on the
    # quic listener so all worker processes can share the UDP port —
    # only one server block per port may declare it, and we have only
    # one HTTPS server here so it's safe to attach unconditionally.
    # The IPv4-only listen — we don't have AAAA records yet, so [::]
    # would just sit unused.
    listen 443 quic reuseport;

    server_name mykunak.ru samurchs.ru;

    ssl_certificate     /etc/letsencrypt/live/samur/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/samur/privkey.pem;

    # Modern TLS config. QUIC mandates TLS 1.3; the TCP listeners still
    # accept 1.2 for the long tail of older clients (older Android
    # WebView, Java HTTP libraries on news scrapers, etc.).
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS (1 year)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Advertise HTTP/3 to clients arriving over HTTP/2. Browsers (Chrome,
    # Firefox, Safari, Edge) cache this header and try QUIC on subsequent
    # connections. ma=86400 = 24 h cache. The motivation here isn't speed
    # — it's RU-operator DPI evasion: TSPU rules are tuned for TCP+TLS
    # and most haven't caught up to QUIC yet, so an HTTP/3 connection
    # often slips through where HTTP/2 was getting killed mid-stream.
    # `always` so the hint reaches error responses too.
    add_header Alt-Svc 'h3=":443"; ma=86400' always;

    # Cap concurrent sockets per IP across this server. Single abusive
    # client can't monopolise sockets. Legitimate PWAs open a handful
    # (HTTP/2 multiplexes many streams on one), so 30 is safely above normal.
    limit_conn conn_per_ip 30;

    # Anonymous SOS — strictest bucket. Abuse here wastes rescue coordination
    # attention, so 3 req/min with a small burst tolerance.
    location = /api/v1/help-requests/sos {
        limit_req zone=sos burst=2 nodelay;
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auth endpoints — brute-force protection. 10 req/min with burst 5
    # covers real flows (enter code, retry, etc.) without letting a
    # script grind through credentials.
    location ~ ^/api/v1/auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Webhook inbound (TG/VK/MCHS feeds) — upstream services burst legitimately.
    location /api/v1/webhook/ {
        limit_req zone=webhook burst=30 nodelay;
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # General API — 120 req/min per IP, burst 30 nodelay. An active user
    # browsing the map easily hits 20-30 requests in a short window (tiles,
    # stations, forecasts, incidents, help requests) so the burst must be
    # generous. Sustained rate 120/min is 2/s — well above normal use.
    location /api/ {
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 25m;
    }

    # WebSocket — no rate limit (sustained connection, one socket per client).
    location /socket.io/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Metrics (internal)
    location /metrics {
        proxy_pass http://api:3000;
        allow 172.16.0.0/12;
        allow 10.0.0.0/8;
        allow 127.0.0.1;
        deny all;
    }

    # PWA (default) — generous bucket since loading the map pulls many
    # small chunks (CSS, JS, icons). 300 req/min = 5/s sustained with burst 50.
    location / {
        limit_req zone=pwa burst=50 nodelay;
        proxy_pass http://pwa:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
